name: Submarine Cable Monitor

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      export_data:
        description: 'Export data to JSON/CSV after run'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: Run Monitor and Deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: |
          mkdir -p data logs
          python -m src.main --init-db

      - name: Run monitor
        id: monitor
        run: |
          python -m src.main 2>&1 | tee monitor_output.log
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Export data for GitHub Pages
        run: |
          python -m src.main --export-json docs/data/export.json
          python -m src.main --export-csv docs/data/export.csv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output
          path: |
            data/
            logs/
            docs/data/
            monitor_output.log
          retention-days: 30

      - name: Commit and push updates
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/ || true
          git add data/ || true
          git add logs/ || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update monitoring data" && git push)
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

  deploy-pages:
    needs: monitor
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-on-failure:
    needs: monitor
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Submarine Cable Monitor Failed';
            const body = 'The submarine cable monitoring workflow has failed. Please check the logs for details.';

            // Check if there's already an open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['monitoring-failure']
              });
            }
