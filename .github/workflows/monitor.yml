name: Submarine Cable Monitor

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Optional sources: google_news subtelforum submarinenetworks"
        required: false
        default: ""
      dry_run:
        description: "Run a small sample without committing data"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: Collect, Export, and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize event store
        run: |
          mkdir -p data docs/data logs
          python -m src.main --init-db

      - name: Run monitor
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_BASE_URL: ${{ secrets.SILICONFLOW_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-ai/DeepSeek-V3' }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'BAAI/bge-m3' }}
        run: |
          if [ "${{ github.event.inputs.sources }}" != "" ]; then
            SOURCE_ARGS="--sources ${{ github.event.inputs.sources }}"
          else
            SOURCE_ARGS=""
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          else
            DRY_RUN=""
          fi
          python -m src.main --run $SOURCE_ARGS $DRY_RUN

      - name: Export data for GitHub Pages
        run: |
          python -m src.main --export-json docs/data/events.json --export-csv docs/data/events.csv

      - name: Upload monitor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output
          path: |
            data/events.jsonl
            docs/data/events.json
            docs/data/events.csv
          retention-days: 30

      - name: Commit and push data updates
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events.jsonl docs/data/events.json docs/data/events.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update submarine cable events" && git push)
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/"

  deploy-pages:
    name: Deploy GitHub Pages
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-on-failure:
    needs: [monitor, deploy-pages]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring-failure'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Submarine Cable Monitor Failed',
                body: 'The scheduled submarine cable monitoring workflow failed. Check the workflow logs for details.',
                labels: ['monitoring-failure']
              });
            }
