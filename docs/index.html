<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>海缆事件浏览器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #182235;
      --muted: #667085;
      --line: #d9e1ec;
      --accent: #0f766e;
      --accent-weak: #d9f3ef;
      --warn: #9a5b00;
      --danger: #b42318;
      --shadow: 0 16px 40px rgba(24, 34, 53, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .shell {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .source {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      max-width: 520px;
      overflow-wrap: anywhere;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 88px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      line-height: 1;
    }

    .filters {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.4fr 1.2fr repeat(6, minmax(96px, 1fr));
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    input, select, button {
      width: 100%;
      min-height: 38px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
    }

    input:focus, select:focus {
      outline: 2px solid var(--accent-weak);
      border-color: var(--accent);
    }

    button {
      cursor: pointer;
      border-color: var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 650;
    }

    .reset {
      background: #fff;
      color: var(--accent);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 14px;
      align-items: start;
    }

    .table-wrap, .detail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef4f8;
      color: #344054;
      font-weight: 700;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover, tbody tr.active {
      background: #f0faf8;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      background: var(--accent-weak);
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.warn {
      background: #fff4d6;
      color: var(--warn);
    }

    .badge.danger {
      background: #fee4e2;
      color: var(--danger);
    }

    .scroll {
      max-height: calc(100vh - 286px);
      overflow: auto;
    }

    .detail {
      position: sticky;
      top: 18px;
      padding: 16px;
    }

    .detail h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 9px 12px;
      font-size: 13px;
    }

    .detail-grid dt {
      margin: 0;
      color: var(--muted);
    }

    .detail-grid dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .original {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f6f8fb;
      color: #344054;
      line-height: 1.55;
      font-size: 13px;
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .original h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 1180px) {
      .filter-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .content { grid-template-columns: 1fr; }
      .detail { position: static; }
      .scroll { max-height: none; }
    }

    @media (max-width: 760px) {
      .shell { width: min(100vw - 20px, 1440px); padding-top: 14px; }
      header { display: block; }
      .source { margin-top: 10px; text-align: left; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filter-grid { grid-template-columns: 1fr; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>海缆事件浏览器</h1>
        <div class="subtitle">查看自动提取、核验和去重后的海缆舆情事件。</div>
      </div>
      <div class="source" id="source"></div>
    </header>

    <section class="stats" aria-label="统计">
      <div class="stat"><span>当前结果</span><strong id="stat-count">0</strong></div>
      <div class="stat"><span>海缆数量</span><strong id="stat-cables">0</strong></div>
      <div class="stat"><span>最早发生</span><strong id="stat-first">-</strong></div>
      <div class="stat"><span>最新发生</span><strong id="stat-last">-</strong></div>
    </section>

    <section class="filters">
      <form id="filters" class="filter-grid">
        <label>全文检索
          <input name="q" placeholder="地点、原因、标题、原文" />
        </label>
        <label>海缆名
          <input name="submarine_name" placeholder="如 AAG、PEACE" />
        </label>
        <label>日期字段
          <select name="date_field">
            <option value="occurrence_date">发生日期</option>
            <option value="published_date">发布日期</option>
          </select>
        </label>
        <label>年
          <input name="year" inputmode="numeric" placeholder="2026" />
        </label>
        <label>月
          <input name="month" inputmode="numeric" placeholder="07" />
        </label>
        <label>日
          <input name="day" inputmode="numeric" placeholder="07" />
        </label>
        <label>事故类型
          <select name="accident_type" id="type-filter"><option value="">全部</option></select>
        </label>
        <label>可信度
          <select name="trustworthy" id="trust-filter"><option value="">全部</option></select>
        </label>
        <button type="submit">检索</button>
        <button class="reset" type="button" id="reset">重置</button>
      </form>
    </section>

    <section class="content">
      <div class="table-wrap">
        <div class="table-tools">
          <span id="result-text">加载中</span>
          <span>点击行查看详情</span>
        </div>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th style="width: 24%">海缆名</th>
                <th style="width: 12%">发生日期</th>
                <th style="width: 12%">类型</th>
                <th style="width: 18%">影响区域</th>
                <th style="width: 20%">原因</th>
                <th style="width: 14%">来源</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
          <div class="empty" id="empty" hidden>没有匹配的事件。</div>
        </div>
      </div>

      <aside class="detail" id="detail">
        <h2>请选择一条事件</h2>
        <dl class="detail-grid"></dl>
      </aside>
    </section>
  </main>

  <script>
    const state = { allEvents: [], events: [], selected: null };
    const fields = [
      ["submarine_name", "海缆名"],
      ["occurrence_date", "发生日期"],
      ["repair_date", "修复日期"],
      ["accident_type", "事故类型"],
      ["accident_location", "事故地点"],
      ["affected_area", "影响区域"],
      ["reason", "原因"],
      ["TrustWorthy", "可信度"],
      ["source", "来源"],
      ["published_date", "发布日期"],
      ["title", "标题"],
      ["event_uid", "ID"],
      ["url", "URL"],
      ["discovered_url", "发现链接"]
    ];

    const el = (id) => document.getElementById(id);
    const text = (value) => value && String(value).trim() ? String(value).trim() : "-";
    const escapeHtml = (value) => text(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[char]));

    function badgeClass(value) {
      const normalized = String(value || "").toLowerCase();
      if (normalized.includes("not") || normalized.includes("unverified")) return "badge warn";
      if (normalized.includes("cut")) return "badge danger";
      return "badge";
    }

    function eventDate(event, field = "occurrence_date") {
      const value = event[field] || "";
      const match = String(value).match(/\d{4}[-/.]\d{1,2}[-/.]\d{1,2}/);
      return match ? new Date(match[0].replaceAll("/", "-")) : null;
    }

    function normalizeEvent(event, index) {
      return {
        ...event,
        _row_id: event.event_uid || String(index + 1),
        submarine_name: event.submarine_name || event.cable_name || "",
        TrustWorthy: event.TrustWorthy || event.verification_status || "",
      };
    }

    function updateStats(events) {
      el("stat-count").textContent = events.length;
      el("stat-cables").textContent = new Set(events.map((item) => item.submarine_name).filter(Boolean)).size;
      const dates = events.map((item) => eventDate(item)).filter((item) => item && !Number.isNaN(item.valueOf())).sort((a, b) => a - b);
      el("stat-first").textContent = dates[0] ? dates[0].toISOString().slice(0, 10) : "-";
      el("stat-last").textContent = dates.at(-1) ? dates.at(-1).toISOString().slice(0, 10) : "-";
    }

    function renderRows(events) {
      const rows = el("rows");
      rows.innerHTML = events.map((event) => `
        <tr data-row="${escapeHtml(event._row_id)}" class="${state.selected && state.selected._row_id === event._row_id ? "active" : ""}">
          <td><strong>${escapeHtml(event.submarine_name)}</strong></td>
          <td>${escapeHtml(event.occurrence_date)}</td>
          <td><span class="${badgeClass(event.accident_type)}">${escapeHtml(event.accident_type)}</span></td>
          <td>${escapeHtml(event.affected_area)}</td>
          <td>${escapeHtml(event.reason)}</td>
          <td>${escapeHtml(event.source)}</td>
        </tr>
      `).join("");
      el("empty").hidden = events.length !== 0;
      el("result-text").textContent = `共 ${events.length} 条结果`;
      rows.querySelectorAll("tr").forEach((row) => {
        row.addEventListener("click", () => {
          state.selected = state.events.find((item) => String(item._row_id) === row.dataset.row);
          renderDetail(state.selected);
          renderRows(state.events);
        });
      });
    }

    function renderDetail(event) {
      const panel = el("detail");
      if (!event) {
        panel.innerHTML = "<h2>请选择一条事件</h2><dl class='detail-grid'></dl>";
        return;
      }
      const title = event.submarine_name || event.title || "事件详情";
      const details = fields.map(([key, label]) => {
        let value = escapeHtml(event[key]);
        if ((key === "url" || key === "discovered_url") && event[key]) {
          value = `<a href="${escapeHtml(event[key])}" target="_blank" rel="noreferrer">${escapeHtml(event[key])}</a>`;
        }
        return `<dt>${label}</dt><dd>${value}</dd>`;
      }).join("");
      const originalZh = event.original_text_zh || "";
      const original = event.original_text || "";
      panel.innerHTML = `
        <h2>${escapeHtml(title)}</h2>
        <dl class="detail-grid">${details}</dl>
        <div class="original">
          <h3>原文片段中文翻译</h3>
          ${escapeHtml(originalZh || original)}
        </div>
        ${originalZh && original ? `<div class="original"><h3>原文片段</h3>${escapeHtml(original)}</div>` : ""}
      `;
    }

    function optionValues(events, field) {
      return [...new Set(events.map((item) => text(item[field])).filter((item) => item !== "-"))].sort();
    }

    function populateOptions(events) {
      const typeSelect = el("type-filter");
      const trustSelect = el("trust-filter");
      const selectedType = typeSelect.value;
      const selectedTrust = trustSelect.value;
      typeSelect.innerHTML = '<option value="">全部</option>' + optionValues(events, "accident_type").map((item) => `<option>${escapeHtml(item)}</option>`).join("");
      trustSelect.innerHTML = '<option value="">全部</option>' + optionValues(events, "TrustWorthy").map((item) => `<option>${escapeHtml(item)}</option>`).join("");
      typeSelect.value = selectedType;
      trustSelect.value = selectedTrust;
    }

    function applyFilters() {
      const data = new FormData(el("filters"));
      const q = String(data.get("q") || "").trim().toLowerCase();
      const cable = String(data.get("submarine_name") || "").trim().toLowerCase();
      const dateField = String(data.get("date_field") || "occurrence_date");
      const year = String(data.get("year") || "").trim();
      const month = String(data.get("month") || "").trim().padStart(2, "0");
      const day = String(data.get("day") || "").trim().padStart(2, "0");
      const accidentType = String(data.get("accident_type") || "").trim().toLowerCase();
      const trustworthy = String(data.get("trustworthy") || "").trim().toLowerCase();

      state.events = state.allEvents.filter((event) => {
        const searchable = Object.values(event).join(" ").toLowerCase();
        if (q && !searchable.includes(q)) return false;
        if (cable && !String(event.submarine_name || "").toLowerCase().includes(cable)) return false;
        if (accidentType && String(event.accident_type || "").toLowerCase() !== accidentType) return false;
        if (trustworthy && String(event.TrustWorthy || "").toLowerCase() !== trustworthy) return false;
        if (year || month.trim() || day.trim()) {
          const parts = String(event[dateField] || "").match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
          if (!parts) return false;
          if (year && parts[1] !== year) return false;
          if (month.trim() && parts[2].padStart(2, "0") !== month) return false;
          if (day.trim() && parts[3].padStart(2, "0") !== day) return false;
        }
        return true;
      }).sort((a, b) => String(b.occurrence_date || b.published_date || "").localeCompare(String(a.occurrence_date || a.published_date || "")));

      state.selected = state.events[0] || null;
      updateStats(state.events);
      renderRows(state.events);
      renderDetail(state.selected);
    }

    async function loadEvents() {
      const response = await fetch("data/events.json", { cache: "no-store" });
      const payload = await response.json();
      state.allEvents = payload.map(normalizeEvent);
      populateOptions(state.allEvents);
      el("source").textContent = `docs/data/events.json，共 ${state.allEvents.length} 条原始记录`;
      applyFilters();
    }

    el("filters").addEventListener("submit", (event) => {
      event.preventDefault();
      applyFilters();
    });

    el("reset").addEventListener("click", () => {
      el("filters").reset();
      applyFilters();
    });

    loadEvents().catch((error) => {
      el("result-text").textContent = error.message;
    });
  </script>
</body>
</html>
